name: Generate Changelog and Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update Version and Compile Translations
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Extract version number (strip leading 'v' if present)
          VERSION=${TAG_NAME#v}
          echo "Bumping version to $VERSION"
          
          # Update Version: header in main plugin file
          sed -i "s/\(Version:\s*\).*/\1$VERSION/" woo-marketing-automation.php
          
          # Update WMA_VERSION constant
          sed -i "s/\(define( 'WMA_VERSION',\s*'\).*\('\s*);\)/\1$VERSION\2/" woo-marketing-automation.php
          
          # Update Project-Id-Version in .po files
          sed -i "s/\(Project-Id-Version: \).*\(\\\\n\"\)/\1WooCommerce Marketing Automation $VERSION\2/" languages/*.po
          
          # Install gettext for compilation
          sudo apt-get update && sudo apt-get install -y gettext
          
          # Compile .po files to .mo
          for file in languages/*.po; do
            if [ -f "$file" ]; then
              filename=$(basename "$file" .po)
              msgfmt -o "languages/${filename}.mo" "$file"
              echo "Compiled $file to languages/${filename}.mo"
            fi
          done

      - name: Generate Changelog
        id: changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Current date
          DATE=$(date +'%Y-%m-%d')
          
          # Find the previous tag.
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG_NAME^" 2>/dev/null || echo "")
          
          echo "Current Tag: $TAG_NAME"
          echo "Previous Tag: $PREV_TAG"
          
          # Get commits. If no previous tag, get all commits up to current tag.
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --no-merges --pretty=format:"- %s (%h)" "$TAG_NAME")
          else
            COMMITS=$(git log --no-merges --pretty=format:"- %s (%h)" "$PREV_TAG".."$TAG_NAME")
          fi
          
          if [ -z "$COMMITS" ]; then
            COMMITS="- No documented changes."
          fi
          
          # Save the release notes for the GitHub Release body
          echo "$COMMITS" > release_notes.md
          
          # Create temporary file with the new release block
          echo "" > new_changelog.md
          echo "## [$TAG_NAME] - $DATE" >> new_changelog.md
          echo "" >> new_changelog.md
          echo "$COMMITS" >> new_changelog.md
          echo "" >> new_changelog.md
          
          # If CHANGELOG.md doesn't exist, create it with a header
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "All notable changes to this project will be documented in this file." >> CHANGELOG.md
          fi
          
          # Insert the new changelog block after the "All notable changes..." line if it doesn't exist
          if ! grep -q "## \[$TAG_NAME\]" CHANGELOG.md; then
            sed -i '/All notable changes to this project will be documented in this file./r new_changelog.md' CHANGELOG.md
          fi
          rm new_changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body_path: release_notes.md
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: true

      - name: Commit and Push Changes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Configure Git user for the bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Extract version number
          VERSION=${TAG_NAME#v}
          
          git add CHANGELOG.md woo-marketing-automation.php languages/*.po languages/*.mo
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to $VERSION, update changelog and translations [skip ci]"
            git push origin main
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          draft: false

      - name: Cleanup
        if: always()
        run: rm -f release_notes.md
