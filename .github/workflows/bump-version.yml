name: Version and Tag on Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest
    
    # Run only if the PR was actually merged
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the main branch after merge
          ref: main
          fetch-depth: 0

      - name: Bump minor version
        run: |
          # Read current version from woo-marketing-automation.php
          CURRENT_VERSION=$(grep -oP '(?<=Version:\s{5})[0-9]+\.[0-9]+\.[0-9]+' woo-marketing-automation.php)
          
          if [ -z "$CURRENT_VERSION" ]; then
            echo "Error: Could not determine current version."
            exit 1
          fi

          echo "Current Version: $CURRENT_VERSION"

          # Calculate new minor version
          IFS='.' read -ra ADDR <<< "$CURRENT_VERSION"
          NEW_VERSION="${ADDR[0]}.$((ADDR[1]+1)).0"
          
          echo "New Version: $NEW_VERSION"

          # 1. Update woo-marketing-automation.php (Plugin Header)
          sed -i "s/Version:     $CURRENT_VERSION/Version:     $NEW_VERSION/g" woo-marketing-automation.php
          
          # 2. Update woo-marketing-automation.php (Constant)
          sed -i "s/define( 'WMA_VERSION',\s*'$CURRENT_VERSION' );/define( 'WMA_VERSION',     '$NEW_VERSION' );/g" woo-marketing-automation.php

          # 3. Update .po files
          for file in languages/*.po; do
            if [ -f "$file" ]; then
              sed -i "s/Project-Id-Version: WooCommerce Marketing Automation $CURRENT_VERSION/Project-Id-Version: WooCommerce Marketing Automation $NEW_VERSION/g" "$file"
            fi
          done

      - name: Compile translation files (.mo)
        run: |
          sudo apt-get update && sudo apt-get install -y gettext
          for po_file in languages/*.po; do
            if [ -f "$po_file" ]; then
              mo_file="${po_file%.po}.mo"
              msgfmt "$po_file" -o "$mo_file"
            fi
          done

      - name: Generate Changelog
        run: |
          NEW_VERSION=$(grep -oP '(?<=Version:\s{5})[0-9]+\.[0-9]+\.[0-9]+' woo-marketing-automation.php)
          DATE=$(date +'%Y-%m-%d')
          
          # Get commits from the PR that was just merged
          # We use the PR merge commit's parent to find the range
          COMMITS=$(git log --no-merges --pretty=format:"- %s (%h)" ${{ github.event.pull_request.base.sha }}..HEAD)
          
          if [ -z "$COMMITS" ]; then
            COMMITS="- No documented changes."
          fi
          
          # Create temporary file with the new release block
          echo "## [$NEW_VERSION] - $DATE" > new_changelog.md
          echo "" >> new_changelog.md
          echo "$COMMITS" >> new_changelog.md
          echo "" >> new_changelog.md
          
          # If CHANGELOG.md doesn't exist, create it with a header
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "All notable changes to this project will be documented in this file." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi
          
          # Insert the new changelog block after the header (line 4)
          sed -i '4r new_changelog.md' CHANGELOG.md
          rm new_changelog.md

      - name: Commit, Tag and Push
        run: |
          # Configure Git user for the bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          NEW_VERSION=$(grep -oP '(?<=Version:\s{5})[0-9]+\.[0-9]+\.[0-9]+' woo-marketing-automation.php)
          
          git add woo-marketing-automation.php languages/*.po languages/*.mo CHANGELOG.md
          git commit -m "chore: release version $NEW_VERSION and update CHANGELOG"
          
          # Create git tag
          git tag -a "v$NEW_VERSION" -m "Version $NEW_VERSION"
          
          # Push both the commit and the tag to main
          git push origin main --follow-tags

